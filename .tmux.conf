set -g mode-keys vi

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Tmux Plugin Manager (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
# set -g @plugin 'catppuccin/tmux#latest'
# set -g @catppuccin_flavor 'mocha'

# Initialize TPM (keep this line at the bottom of the file)
run '~/.tmux/plugins/tpm/tpm'

# tmux-resurrect configuration
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-save 'on'
set -g @resurrect-restore 'on'

# tmux-continuum configuration
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# tmux terminal colour
set -g default-terminal "screen-256color"
set -as terminal-features ",xterm-256color:RGB"

# set-option -g default-command "reattach-to-user-namespace -l /usr/bin/fish"
set-option -g escape-time 0
set-option -g set-clipboard on
set-option -g default-command "fish"

# ── Status bar: cinnabar session/datetime · eza-colored windows · dim path ──
set -g status on
set -g status-interval 5
set -g status-justify left
set -g status-style "bg=#1c1c24,fg=#696978"

# session name — cinnabar block (leftmost)
set -g status-left "#[bg=#ff5f00,fg=#1c1c24,bold]  #S  #[bg=#1c1c24,fg=#696978] "
set -g status-left-length 30

# windows in eza drwx order by index (blue->yellow->red->green); active is bold
set -g window-status-separator "  "
set -g window-status-format "#[bg=#1c1c24,fg=#{?#{==:#{e|m|:#{window_index},4},0},#bae1ff,#{?#{==:#{e|m|:#{window_index},4},1},#ffe7aa,#{?#{==:#{e|m|:#{window_index},4},2},#ffb3ba,#baffc9}}}]#I #W"
set -g window-status-current-format "#[fg=#1c1c24,bold,bg=#{?#{==:#{e|m|:#{window_index},4},0},#bae1ff,#{?#{==:#{e|m|:#{window_index},4},1},#ffe7aa,#{?#{==:#{e|m|:#{window_index},4},2},#ffb3ba,#baffc9}}}] #I #W "

# right side — dim current path, then cinnabar date/time block (rightmost)
set -g status-right "#[bg=#1c1c24,fg=#696978]#{s,^/home/[^/]+,~,:#{s,^/Users/[^/]+,~,:pane_current_path}}  #[bg=#ff5f00,fg=#1c1c24,bold]  %Y-%m-%d %H:%M  "
set -g status-right-length 100
